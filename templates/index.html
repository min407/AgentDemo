<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银行智能尽调Agent系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- PDF导出库 -->
    <script src="/static/js/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🏦</span>
                <span class="logo-text">银行智能尽调系统</span>
            </div>
            <div class="user-info">
                <span class="user-name">客户经理</span>
            </div>
        </header>

        <!-- 侧边栏 -->
        <aside class="sidebar">
            <nav class="nav">
                <a href="#" class="nav-item active" onclick="switchTab('query')">
                    <span class="nav-icon">🔍</span>
                    <span>智能查询</span>
                </a>
                <a href="#" class="nav-item" onclick="showComingSoon('历史记录')">
                    <span class="nav-icon">📋</span>
                    <span>历史记录</span>
                    <span class="coming-soon-badge">开发中</span>
                </a>
                <a href="#" class="nav-item" onclick="showComingSoon('报告管理')">
                    <span class="nav-icon">📄</span>
                    <span>报告管理</span>
                    <span class="coming-soon-badge">开发中</span>
                </a>
                <a href="#" class="nav-item" onclick="showComingSoon('系统设置')">
                    <span class="nav-icon">⚙️</span>
                    <span>系统设置</span>
                    <span class="coming-soon-badge">开发中</span>
                </a>
            </nav>
        </aside>

        <!-- 开发中提示弹窗 -->
        <div id="comingSoonModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-icon">🚧</div>
                <div class="modal-title">功能开发中</div>
                <div class="modal-text" id="modalText">敬请期待！</div>
                <button class="modal-btn" onclick="closeModal()">知道了</button>
            </div>
        </div>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 查询区域 -->
            <section class="search-section">
                <h2>企业风险尽调分析</h2>
                <p class="subtitle">选择企业或输入客户名称/证件号，快速获取企业风险分析报告</p>
                <div class="search-box">
                    <input type="text" id="keywordInput" class="search-input" list="enterpriseList" placeholder="请输入客户名称或统一社会信用代码" value="深圳市赛为智能股份有限公司">
                    <datalist id="enterpriseList">
                        <option value="深圳市赛为智能股份有限公司"></option>
                        <option value="深圳市恒盈投资集团有限公司"></option>
                        <option value="深圳市长亮科技股份有限公司"></option>
                        <option value="滴滴出行科技有限公司"></option>
                        <option value="金蝶软件（中国）有限公司"></option>
                    </datalist>
                    <button id="analyzeBtn" class="btn-primary">开始分析</button>
                </div>
            </section>

            <!-- 分析进度 -->
            <section class="agent-section" id="progressSection">
                <h3>AI智能分析流程</h3>
                <div class="flow-steps">
                    <div class="step" id="step1">
                        <div class="step-num">1</div>
                        <div class="step-content">
                            <div class="step-title">查询企业信息</div>
                            <div class="step-desc">获取企业基本信息</div>
                        </div>
                    </div>
                    <div class="step-arrow">→</div>
                    <div class="step" id="step2">
                        <div class="step-num">2</div>
                        <div class="step-content">
                            <div class="step-title">分析交易数据</div>
                            <div class="step-desc">分析账户流水</div>
                        </div>
                    </div>
                    <div class="step-arrow">→</div>
                    <div class="step" id="step3">
                        <div class="step-num">3</div>
                        <div class="step-content">
                            <div class="step-title">AI风险评估</div>
                            <div class="step-desc">多维度风险分析</div>
                        </div>
                    </div>
                    <div class="step-arrow">→</div>
                    <div class="step" id="step4">
                        <div class="step-num">4</div>
                        <div class="step-content">
                            <div class="step-title">智能生成报告</div>
                            <div class="step-desc">输出分析结果</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 分析结果 -->
            <section class="result-section" id="resultSection" style="display: none;">
                <h3>尽调报告摘要</h3>
                <div class="result-card" id="reportCard">
                    <!-- 风险等级 -->
                    <div class="risk-badge" id="riskBadge">
                        <span class="risk-icon">⚠️</span>
                        <span class="risk-text" id="riskText">中等风险</span>
                    </div>

                    <!-- 风险评分进度条 -->
                    <div class="risk-score-bar">
                        <div class="risk-score-label">
                            <span>综合风险评分</span>
                            <span class="risk-score-value" id="riskScoreValue">50分</span>
                        </div>
                        <div class="risk-score-track">
                            <div class="risk-score-fill medium" id="riskScoreFill" style="width: 50%;"></div>
                        </div>
                    </div>

                    <!-- 维度评分卡片 -->
                    <div class="dimension-scores" id="dimensionScores">
                        <!-- 动态填充 -->
                    </div>

                    <!-- 红旗信号 -->
                    <div id="redFlagsSection" style="display: none;">
                        <h4 style="font-size: 14px; font-weight: 600; color: #c62828; margin-bottom: 12px;">🚩 红旗信号</h4>
                        <div id="redFlagsList"></div>
                    </div>

                    <!-- 企业信息 -->
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">企业名称</div>
                            <div class="info-value" id="companyName">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">所属行业</div>
                            <div class="info-value" id="industry">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">注册资本</div>
                            <div class="info-value" id="regCapital">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">风险等级</div>
                            <div class="info-value" id="riskLevel">-</div>
                        </div>
                    </div>

                    <!-- 关键发现 -->
                    <div class="findings">
                        <h4>关键发现</h4>
                        <ul id="findingsList">
                            <!-- 动态填充 -->
                        </ul>
                    </div>

                    <!-- 建议 -->
                    <div class="suggestion">
                        <h4>结论与建议</h4>
                        <p id="suggestionText">-</p>
                    </div>

                    <!-- 后续步骤 -->
                    <div class="next-steps" id="nextStepsSection" style="display: none; margin-bottom: 20px;">
                        <h4 style="font-size: 14px; font-weight: 600; color: #1a73e8; margin-bottom: 12px;">📋 后续步骤</h4>
                        <ul id="nextStepsList" style="list-style: none;"></ul>
                    </div>

                    <!-- 导出按钮 -->
                    <button class="btn-secondary" id="exportBtn">导出报告</button>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
